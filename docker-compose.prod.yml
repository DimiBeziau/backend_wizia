services:
  app:
    image: ghcr.io/dimibeziau/backend_wizia/app:latest
    container_name: wizia-app
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - wizia-storage:/var/www/storage
      - wizia-public:/var/www/public_mounted
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh
    environment:
      # Database
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: 127.0.0.1
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # App
      APP_URL: ${APP_URL}
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}

      # Mail
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}

      # Others
      KEY_API_GEMINI: ${KEY_API_GEMINI}
    depends_on:
      - db

  web:
    image: ghcr.io/dimibeziau/backend_wizia/nginx:latest
    container_name: wizia-web
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - wizia-public:/var/www/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:latest
    container_name: wizia-db
    restart: unless-stopped
    network_mode: "host"
    environment:
      MYSQL_DATABASE: wizia_db_prod
      MYSQL_ROOT_PASSWORD: wizia_password_prod
      MYSQL_PASSWORD: wizia_password_prod
      MYSQL_USER: wizia_user_prod
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - ./docker-compose/mysql:/docker-entrypoint-initdb.d
      - ./mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: wizia-pma
    network_mode: "host"
    environment:
      PMA_HOST: 127.0.0.1
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  wizia-storage:
  wizia-public:
